aid: logmeal
name: LogMeal
description: LogMeal provides a Food Recognition Image API that detects foods, drinks, vegetables, fruits and prepared dishes
  from images. The platform offers semantic tagging including food group, dish and ingredients recognition, as well as nutritional
  information analysis with 35+ nutritional indicators and user intake history tracking.
